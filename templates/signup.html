<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Cricket Predictor - Signup</title>
    <style>
        /* login.html-la irukka same CSS-ah copy panni inga paste pannunga */
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 15px; width: 350px; text-align: center; border-top: 5px solid #00ff87; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 5px; background: #00ff87; color: #121212; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #00ff87;">Create Account</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Set Password" required>
            <button type="submit">SIGN UP</button>
        </form>
        <div style="margin-top: 20px;"><a href="/login" style="color: #00ff87; text-decoration: none;">Back to Login</a></div>
    </div>
</body>
</html>
